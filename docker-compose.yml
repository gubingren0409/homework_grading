services:
  redis:
    image: redis:7-alpine
    container_name: homework-grader-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  grader-api:
    build: .
    container_name: homework-grader-api
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  grader-worker:
    build: .
    command: celery -A src.worker.main worker --loglevel=info --concurrency=2
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BATCH_INTERNAL_CONCURRENCY: 6
      BATCH_POSTPROCESS_CONCURRENCY: 6
      BATCH_PROGRESS_UPDATE_STEP: 2
      BATCH_PROGRESS_MIN_INTERVAL_SECONDS: 1.0
      FILE_PREPROCESS_CONCURRENCY: ${FILE_PREPROCESS_CONCURRENCY:-3}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  outputs:
