services:
  # --- Nginx 反向代理（P9-02） ---
  nginx:
    image: nginx:1.27-alpine
    container_name: homework-grader-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      # 生产环境：取消注释以启用 HTTPS
      # - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy_common.conf:/etc/nginx/proxy_common.conf:ro
      # 生产环境：挂载 SSL 证书目录
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      grader-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 15s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: homework-grader-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  grader-api:
    build: .
    container_name: homework-grader-api
    # 通过 Nginx 代理访问，不再直接暴露 8000
    # 如需直接访问 API（开发调试），取消下行注释
    # ports:
    #   - "8000:8000"
    expose:
      - "8000"
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  grader-worker:
    build: .
    command: celery -A src.worker.main worker --loglevel=info --concurrency=2
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BATCH_INTERNAL_CONCURRENCY: 6
      BATCH_POSTPROCESS_CONCURRENCY: 6
      BATCH_PROGRESS_UPDATE_STEP: 2
      BATCH_PROGRESS_MIN_INTERVAL_SECONDS: 1.0
      FILE_PREPROCESS_CONCURRENCY: ${FILE_PREPROCESS_CONCURRENCY:-3}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  outputs:
