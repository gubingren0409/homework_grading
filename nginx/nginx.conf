upstream grader_api {
    server grader-api:8000;
}

server {
    listen 80;
    server_name _;

    # 将 HTTP 重定向到 HTTPS（生产环境启用）
    # return 301 https://$host$request_uri;

    # 开发模式：直接代理到 API
    include /etc/nginx/proxy_common.conf;
}

