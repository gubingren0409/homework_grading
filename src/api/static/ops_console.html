<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>运营控制台</title>
  <style>
    :root { --bg: #f5f7fb; --card: #fff; --line: #e5e8ef; --primary: #3563e9; }
    body { margin: 0; background: var(--bg); font-family: Arial, sans-serif; color: #1f2937; }
    .wrap { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
    h1 { margin: 0 0 6px; }
    .desc { margin: 0 0 16px; color: #6b7280; font-size: 14px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(16,24,40,.04); }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin: 8px 0; }
    .mono { font-family: Consolas, monospace; white-space: pre-wrap; font-size: 13px; background: #f8fafc; border: 1px solid var(--line); border-radius: 8px; padding: 10px; }
    input, select { padding: 8px; border: 1px solid #cfd7e6; border-radius: 8px; background: #fff; }
    button { padding: 8px 12px; border: 0; border-radius: 8px; cursor: pointer; background: var(--primary); color: #fff; font-weight: 600; }
    button.secondary { background: #596377; }
    .muted { color: #6b7280; font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>运营控制台</h1>
    <p class="desc">简化为三类高频操作：看健康、切模型、做演练。</p>

    <div class="card">
      <h3>系统健康概览</h3>
      <div class="row">
        <button id="snapBtn">刷新配置快照</button>
        <button id="dashboardBtn">刷新运行看板</button>
      </div>
      <div id="obs" class="mono"></div>
    </div>

    <div class="card">
      <h3>模型切换（常用）</h3>
      <div class="row">
        <label>provider</label>
        <select id="provider"><option>qwen</option><option>mock</option></select>
        <label>operator</label>
        <input id="operatorId" type="text" value="ops-console" />
        <button id="switchBtn">立即切换</button>
      </div>
      <div class="muted">默认不暴露复杂阈值参数；需要时可再通过 API 精细调节。</div>
      <div id="control" class="mono" style="margin-top:8px;"></div>
    </div>

    <div class="card">
      <h3>故障演练</h3>
      <div class="row">
        <select id="drillType">
          <option value="redis_unavailable">Redis 不可用</option>
          <option value="model_failure">模型失败</option>
          <option value="sse_disconnect">SSE 断连</option>
          <option value="db_pressure">数据库压力</option>
        </select>
        <button id="runDrillBtn">执行演练</button>
        <button id="drillHistoryBtn" class="secondary">查看最近历史</button>
      </div>
      <div id="drill" class="mono"></div>
    </div>

    <div class="card">
      <h3>审计与策略（查看）</h3>
      <div class="row">
        <button id="policyBtn" class="secondary">查看路由策略</button>
        <button id="auditBtn" class="secondary">查看操作审计</button>
      </div>
      <div id="audit" class="mono"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    function setText(id, v, cls = "") {
      const el = $(id);
      el.className = "mono " + cls;
      el.textContent = typeof v === "string" ? v : JSON.stringify(v, null, 2);
    }
    async function getJson(url) {
      const r = await fetch(url);
      const j = await r.json();
      return { ok: r.ok, data: j };
    }
    async function postJson(url, body) {
      const r = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
      const text = await r.text();
      try { return { ok: r.ok, data: JSON.parse(text) }; } catch { return { ok: r.ok, data: text }; }
    }

    $("snapBtn").onclick = async () => {
      const { ok, data } = await getJson("/api/v1/ops/config/snapshot");
      setText("obs", data, ok ? "" : "err");
    };
    $("dashboardBtn").onclick = async () => {
      const { ok, data } = await getJson("/api/v1/metrics/runtime-dashboard?window_hours=24");
      setText("obs", data, ok ? "" : "err");
    };
    $("switchBtn").onclick = async () => {
      const body = { provider: $("provider").value, operator_id: $("operatorId").value.trim() || null };
      const { ok, data } = await postJson("/api/v1/ops/provider/switch", body);
      setText("control", data, ok ? "" : "err");
    };
    $("runDrillBtn").onclick = async () => {
      const body = { drill_type: $("drillType").value, operator_id: $("operatorId").value.trim() || null };
      const { ok, data } = await postJson("/api/v1/ops/fault-drills/run", body);
      setText("drill", data, ok ? "" : "err");
    };
    $("drillHistoryBtn").onclick = async () => {
      const { ok, data } = await getJson("/api/v1/ops/fault-drills/history?page=1&limit=10");
      setText("drill", data, ok ? "" : "err");
    };
    $("policyBtn").onclick = async () => {
      const { ok, data } = await getJson("/api/v1/router/policy");
      setText("audit", data, ok ? "" : "err");
    };
    $("auditBtn").onclick = async () => {
      const { ok, data } = await getJson("/api/v1/ops/audit/logs?page=1&limit=20");
      setText("audit", data, ok ? "" : "err");
    };

    $("snapBtn").click();
    $("dashboardBtn").click();
  </script>
</body>
</html>
