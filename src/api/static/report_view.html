<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>报告展示页</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #fff;
      --line: #e4e9f4;
      --text: #1f2937;
      --muted: #667085;
      --primary: #3563e9;
      --ok: #0f9d58;
      --warn: #b54708;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: Arial, sans-serif; }
    a { color: var(--primary); text-decoration: none; }
    .wrap { max-width: 1240px; margin: 0 auto; padding: 28px 18px 40px; }
    .hero, .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; box-shadow: 0 4px 18px rgba(15, 23, 42, 0.04); }
    .hero { padding: 22px; margin-bottom: 16px; }
    .hero h1 { margin: 0 0 10px; }
    .lead { margin: 0; color: #475467; line-height: 1.65; }
    .hero-links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    .link-chip { display: inline-flex; align-items: center; padding: 8px 12px; border: 1px solid #d7def0; border-radius: 999px; background: #f8fbff; font-size: 13px; }
    .card { padding: 18px; margin-bottom: 16px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin: 10px 0; }
    .row > label { min-width: 80px; color: #475467; font-size: 14px; }
    input[type="text"], select { width: 100%; max-width: 360px; min-width: 0; padding: 10px 12px; border: 1px solid #cfd7e6; border-radius: 10px; background: #fff; font: inherit; }
    button { padding: 10px 14px; border: 0; border-radius: 10px; cursor: pointer; background: var(--primary); color: #fff; font-weight: 700; }
    .summary-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .summary-item { border: 1px solid #e8edf7; border-radius: 14px; background: #fbfdff; padding: 14px; }
    .summary-item .k { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .summary-item .v { font-size: 24px; font-weight: 700; line-height: 1.2; }
    .summary-item .sub { margin-top: 6px; font-size: 12px; color: var(--muted); }
    .layout { display: grid; gap: 16px; grid-template-columns: 320px minmax(0, 1fr); align-items: start; }
    .layout > *, .card { min-width: 0; }
    .student-list { display: grid; gap: 10px; }
    .student-item { border: 1px solid #e8edf7; border-radius: 12px; padding: 12px; background: #fbfdff; cursor: pointer; }
    .student-item.active { border-color: var(--primary); background: #f8fbff; }
    .tag { display: inline-block; padding: 3px 8px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .tag.ok { background: #e8f7ee; color: var(--ok); }
    .tag.warn { background: #fffaeb; color: var(--warn); }
    .tag.info { background: #eef2ff; color: var(--primary); }
    .section { border-top: 1px solid #eef2f7; padding-top: 14px; margin-top: 14px; }
    .section:first-child { border-top: 0; padding-top: 0; margin-top: 0; }
    .list { display: grid; gap: 10px; }
    .deduction-item, .evidence-item, .suggestion-item { border: 1px solid #e8edf7; border-radius: 12px; padding: 12px; background: #fbfdff; }
    .muted { color: var(--muted); font-size: 12px; }
    .mono { white-space: pre-wrap; overflow-wrap: anywhere; word-break: break-word; font-size: 13px; background: #f8fafc; border: 1px solid var(--line); border-radius: 10px; padding: 12px; }
    .image-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .image-card { border: 1px solid #e8edf7; border-radius: 12px; padding: 12px; background: #fbfdff; }
    .image-card img { width: 100%; height: 180px; object-fit: contain; background: #fff; border: 1px solid #eef2f7; border-radius: 10px; }
    @media (max-width: 960px) { .layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>报告展示页</h1>
      <p class="lead">把任务级报告拆成老师真的能看的单份报告：先在左侧选学生，再看本人的总评、扣分点、证据片段和修改建议。</p>
      <div class="hero-links">
        <a class="link-chip" href="/class-dashboard">班级结果看板</a>
        <a class="link-chip" href="/task-progress">任务进度页</a>
        <a class="link-chip" href="/tasks-list">任务列表</a>
        <a class="link-chip" href="/review-console">复核工作台</a>
      </div>
    </section>

    <section class="card">
      <div class="row">
        <label>task_id</label>
        <input id="taskId" type="text" placeholder="输入 task_id" />
        <button id="loadBtn">加载报告</button>
      </div>
      <div class="row">
        <label>学生</label>
        <select id="studentSelect">
          <option value="">先加载任务</option>
        </select>
      </div>
      <div id="debug" class="mono">等待加载任务报告。</div>
    </section>

    <section class="summary-grid" id="taskSummary"></section>

    <section class="layout">
      <aside class="card">
        <h2 style="margin:0 0 10px;">学生列表</h2>
        <div id="studentList" class="student-list">
          <div class="muted">暂无数据</div>
        </div>
      </aside>

      <main class="card">
        <div id="reportDetail">
          <div class="muted">请选择一名学生查看详情。</div>
        </div>
      </main>
    </section>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function esc(v) {
      return String(v ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function ratioText(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "0%";
      return `${Math.round(Math.max(0, Math.min(1, n)) * 100)}%`;
    }

    function renderTaskSummary(data) {
      const cards = data.cards || [];
      const total = cards.length;
      const passed = cards.filter((item) => item.is_pass).length;
      const review = cards.filter((item) => item.requires_human_review).length;
      const avgDeduction = total ? cards.reduce((sum, item) => sum + Number(item.total_deduction || 0), 0) / total : 0;
      $("taskSummary").innerHTML = `
        <div class="summary-item"><div class="k">task_id</div><div class="v">${esc(data.task_id || "-")}</div><div class="sub">当前已加载任务</div></div>
        <div class="summary-item"><div class="k">任务状态</div><div class="v">${esc(data.task_status || "-")}</div><div class="sub">仅支持已完成任务报告</div></div>
        <div class="summary-item"><div class="k">样本数</div><div class="v">${total}</div><div class="sub">${passed} 份通过</div></div>
        <div class="summary-item"><div class="k">平均扣分</div><div class="v">${avgDeduction.toFixed(2)}</div><div class="sub">班级整体水平参考</div></div>
        <div class="summary-item"><div class="k">建议复核</div><div class="v">${review}</div><div class="sub">优先关注高风险样本</div></div>
      `;
    }

    function renderStudentList(taskId, cards, selectedStudentId) {
      const list = $("studentList");
      const select = $("studentSelect");
      list.innerHTML = "";
      select.innerHTML = "";
      if (!cards.length) {
        list.innerHTML = '<div class="muted">暂无学生结果</div>';
        select.innerHTML = '<option value="">暂无数据</option>';
        return;
      }

      for (const card of cards) {
        const sid = String(card.student_id || "");
        const opt = document.createElement("option");
        opt.value = sid;
        opt.textContent = sid || "未命名学生";
        if (sid === selectedStudentId) {
          opt.selected = true;
        }
        select.appendChild(opt);

        const item = document.createElement("button");
        item.type = "button";
        item.className = `student-item${sid === selectedStudentId ? " active" : ""}`;
        item.innerHTML = `
          <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;">
            <strong>${esc(sid || "未命名学生")}</strong>
            <span class="tag ${card.is_pass ? "ok" : "warn"}">${card.is_pass ? "通过" : "有扣分"}</span>
          </div>
          <div class="muted" style="margin-top:8px;">状态：${esc(card.status || "SCORED")}｜扣分：${Number(card.total_deduction || 0).toFixed(2)}</div>
          <div class="muted" style="margin-top:6px;">复核：${card.requires_human_review ? "建议人工复核" : "无需复核"}｜置信度：${ratioText(card.system_confidence)}</div>
        `;
        item.addEventListener("click", () => selectStudent(taskId, sid));
        list.appendChild(item);
      }
    }

    function renderReportDetail(taskId, card) {
      const box = $("reportDetail");
      if (!card) {
        box.innerHTML = '<div class="muted">请选择一名学生查看详情。</div>';
        return;
      }
      const deductions = Array.isArray(card.deductions) ? card.deductions : [];
      const evidences = Array.isArray(card.evidence_snippets) ? card.evidence_snippets : [];
      const suggestions = Array.isArray(card.suggestions) ? card.suggestions : [];
      const inputImages = Array.isArray(card.input_images) ? card.input_images : [];
      const deductionHtml = deductions.length
        ? deductions.map((item, index) => `
            <div class="deduction-item">
              <strong>扣分点 ${index + 1} · ${esc(item.error_type || "UNKNOWN")}</strong>
              <div class="muted">reference_element_id：${esc(item.reference_element_id || "-")}</div>
              <div style="margin-top:8px;">${esc(item.suggestion || "暂无修改建议")}</div>
              <div class="muted" style="margin-top:8px;">证据片段：${esc(item.evidence_snippet || "-")}</div>
            </div>
          `).join("")
        : '<div class="deduction-item">当前学生没有结构化扣分项。</div>';
      const evidenceHtml = evidences.length
        ? evidences.map((item) => `<div class="evidence-item">${esc(item)}</div>`).join("")
        : '<div class="evidence-item">暂无额外证据片段。</div>';
      const suggestionHtml = suggestions.length
        ? suggestions.map((item) => `<div class="suggestion-item">${esc(item)}</div>`).join("")
        : '<div class="suggestion-item">暂无额外教师建议。</div>';
      const imageHtml = inputImages.length
        ? inputImages.map((item) => `
            <div class="image-card">
              <div class="muted" style="margin-bottom:8px;">${esc(item.name || "原图")}</div>
              <a href="${esc(item.url)}" target="_blank" rel="noopener noreferrer">
                <img src="${esc(item.url)}" alt="${esc(item.name || "原图")}" loading="lazy" />
              </a>
            </div>
          `).join("")
        : '<div class="evidence-item">当前结果未保留可预览的原始作答图片。</div>';

      box.innerHTML = `
        <div class="section">
          <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center;">
            <h2 style="margin:0;">${esc(card.student_id || "未命名学生")}</h2>
            <div>
              <span class="tag info">${esc(card.status || "SCORED")}</span>
              <span class="tag ${card.is_pass ? "ok" : "warn"}">${card.is_pass ? "通过" : "有扣分"}</span>
              <span class="tag ${card.requires_human_review ? "warn" : "ok"}">${card.requires_human_review ? "建议复核" : "无需复核"}</span>
            </div>
          </div>
          <div class="summary-grid" style="margin-top:12px;">
            <div class="summary-item"><div class="k">总扣分</div><div class="v">${Number(card.total_deduction || 0).toFixed(2)}</div><div class="sub">本次机器判定结果</div></div>
            <div class="summary-item"><div class="k">系统置信度</div><div class="v">${ratioText(card.system_confidence)}</div><div class="sub">用于辅助判断是否需要复核</div></div>
            <div class="summary-item"><div class="k">扣分项数</div><div class="v">${deductions.length}</div><div class="sub">结构化诊断条目</div></div>
          </div>
        </div>

        <div class="section">
          <h3 style="margin:0 0 8px;">总体结论</h3>
          <div class="mono">${esc(card.overall_feedback || "")}</div>
        </div>

        <div class="section">
          <h3 style="margin:0 0 8px;">原始作答图片</h3>
          <div class="image-grid">${imageHtml}</div>
        </div>

        <div class="section">
          <h3 style="margin:0 0 8px;">扣分点列表</h3>
          <div class="list">${deductionHtml}</div>
        </div>

        <div class="section">
          <h3 style="margin:0 0 8px;">证据片段</h3>
          <div class="list">${evidenceHtml}</div>
        </div>

        <div class="section">
          <h3 style="margin:0 0 8px;">修改建议</h3>
          <div class="list">${suggestionHtml}</div>
        </div>

        <div class="section">
          <a href="/class-dashboard?task_id=${encodeURIComponent(taskId)}">返回班级看板</a>
        </div>
      `;
    }

    function selectStudent(taskId, studentId) {
      const cards = window.__lastCards || [];
      const selected = cards.find((item) => String(item.student_id || "") === String(studentId || "")) || cards[0] || null;
      renderStudentList(taskId, cards, String(selected && selected.student_id || ""));
      renderReportDetail(taskId, selected);
      if (selected) {
        const url = new URL(window.location.href);
        url.searchParams.set("task_id", taskId);
        url.searchParams.set("student_id", String(selected.student_id || ""));
        window.history.replaceState({}, "", url.toString());
      }
    }

    async function load() {
      const taskId = $("taskId").value.trim();
      if (!taskId) {
        $("debug").textContent = "请先输入 task_id";
        return;
      }
      const resp = await fetch(`/api/v1/grade/${encodeURIComponent(taskId)}/report`);
      const data = await resp.json();
      if (!resp.ok) {
        $("debug").textContent = JSON.stringify(data, null, 2);
        return;
      }
      $("debug").textContent = JSON.stringify({ task_id: data.task_id, task_status: data.task_status, cards: (data.cards || []).length }, null, 2);
      window.__lastTaskId = data.task_id;
      window.__lastCards = data.cards || [];
      renderTaskSummary(data);
      const requestedStudentId = new URLSearchParams(window.location.search).get("student_id") || "";
      const fallback = window.__lastCards[0] ? String(window.__lastCards[0].student_id || "") : "";
      selectStudent(data.task_id, requestedStudentId || fallback);
    }

    $("loadBtn").addEventListener("click", load);
    $("studentSelect").addEventListener("change", (ev) => {
      if (!window.__lastTaskId) return;
      selectStudent(window.__lastTaskId, ev.target.value);
    });

    const q = new URLSearchParams(window.location.search);
    const qTask = q.get("task_id");
    if (qTask) {
      $("taskId").value = qTask;
      load();
    }
  </script>
</body>
</html>
