name: Phase C Regression Matrix

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/run_phasec_regression_matrix.py"
      - ".github/workflows/phasec-regression-matrix.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "**"
  workflow_dispatch:

jobs:
  run-phasec-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run phase C regression matrix
        run: |
          python scripts/run_phasec_regression_matrix.py --rounds 3 --port 18082

      - name: Run Redis-dependent DLQ tests
        run: |
          python -m pytest tests/test_phase33_dlq_validation.py -q

      - name: Upload matrix report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phasec-regression-matrix-report
          path: outputs/phasec_regression_matrix_report.json
