name: Phase C Regression Matrix

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/run_phasec_regression_matrix.py"
      - ".github/workflows/phasec-regression-matrix.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/run_phasec_regression_matrix.py"
      - ".github/workflows/phasec-regression-matrix.yml"
  workflow_dispatch:

jobs:
  run-phasec-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run phase C regression matrix
        run: |
          python scripts/run_phasec_regression_matrix.py --rounds 3 --port 18082

      - name: Upload matrix report
        uses: actions/upload-artifact@v4
        with:
          name: phasec-regression-matrix-report
          path: outputs/phasec_regression_matrix_report.json
