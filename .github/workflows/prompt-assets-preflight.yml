name: Prompt Assets Preflight

on:
  pull_request:
    paths:
      - "configs/prompts/*.json"
      - "scripts/validate_prompt_assets.py"
      - ".github/workflows/prompt-assets-preflight.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "configs/prompts/*.json"
      - "scripts/validate_prompt_assets.py"
      - ".github/workflows/prompt-assets-preflight.yml"
  workflow_dispatch:

jobs:
  validate-prompt-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install jinja2==3.1.4

      - name: Run prompt pre-flight validation
        run: python scripts/validate_prompt_assets.py
